# config/locales/devise.ja.yml
# Deviseの日本語訳ファイル

ja: # 【追加】日本語設定の開始
  devise: # Devise の設定
    sessions: # セッション（ログイン・ログアウト）関連の設定
      new: # ログイン画面の設定
        sign_in: ログイン # ログインボタンのラベル
      signed_in: ログインしました # ログイン成功時のメッセージ
      signed_out: ログアウトしました # ログアウト成功時のメッセージ
    registrations: # ユーザー登録関連の設定
      new: # 新規登録画面の設定
        title: "新規登録" #【修正】新規登録画面のタイトル
        sign_up: 登録 # 【修正】登録ボタンのラベル
      signed_up: アカウント登録が完了しました # 登録成功時のメッセージ
      signed_up_but_unconfirmed: 確認メールを送信しました。メールが届いていない場合は迷惑フォルダを確認してください。 # 登録成功したがメールアドレスが未確認の場合のメッセージ
      destroyed: アカウントを削除しました # アカウント削除成功時のメッセージ
    passwords: # パスワードリセット関連の設定
      new: # パスワードリセット画面の設定
        forgot_your_password: パスワードをお忘れですか? # パスワードリセット画面のタイトル
      send_instructions: パスワードのリセット方法を数分以内にメールでご連絡します # パスワードリセットメール送信後のメッセージ
    confirmations: # メールアドレス確認関連の設定
      send_instructions: アカウントの有効化について数分以内にメールでご連絡します # メールアドレス確認メール送信後のメッセージ
    failure: # ログイン失敗時のメッセージ設定
      invalid: メールアドレスまたはパスワードが違います。 # 認証情報が間違っている場合のメッセージ
      timeout: 通信に失敗しました。インターネット接続を確認してください。 # 通信エラーが発生した場合のメッセージ
      unauthenticated: ログインしてください。 # 未ログイン状態でアクセスした場合のメッセージ
      already_authenticated: すでにログインしています。 # すでにログイン済みの場合のメッセージ
    shared: # 共通で使用する設定
      minimum_password_length: "（%{count}文字以上）" # パスワードの最小文字数を表示するテキスト
      links: # リンクのテキスト設定
        sign_in: ログイン # ログインページへのリンクテキスト
        sign_up: 登録 # 登録ページへのリンクテキスト
        forgot_password: パスワードをお忘れですか？ # パスワードリセットページへのリンクテキスト