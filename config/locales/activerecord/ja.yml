#　【追加】config/locales/activerecord/ja.yml 
# ActiveRecord（モデル）関連の日本語化設定ファイル

ja: # 日本語設定の開始
  activerecord: # ActiveRecord の設定
    models: # モデル名の日本語化
      user: ユーザー # User モデルの日本語表示名
    attributes: # モデルの属性（カラム）名の日本語化
      user: # User モデルの属性
        email: メールアドレス # email カラムの日本語表示名
        password: パスワード # password カラムの日本語表示名
        password_confirmation: パスワード（確認） # password_confirmation カラムの日本語表示名
        weight: 体重 # weight カラムの日本語表示名
        first_name: 名 # first_name カラムの日本語表示名
        last_name: 姓 # last_name カラムの日本語表示名
    errors: # バリデーションエラーメッセージの設定
      messages: # エラーメッセージの定義
        blank: を入力してください # 必須項目が空の場合のメッセージ
        too_short: は%{count}文字以上で入力してください # 最小文字数未満の場合のメッセージ
        too_long: は%{count}文字以内で入力してください # 最大文字数超過の場合のメッセージ
        invalid: は不正な値です # 形式が不正な場合のメッセージ
        taken: はすでに存在します # 重複している場合のメッセージ
        not_a_number: は数値で入力してください # 数値でない場合のメッセージ
        greater_than: は%{count}より大きい値にしてください # 指定値より大きい必要がある場合のメッセージ
        greater_than_or_equal_to: は%{count}以上の値にしてください # 指定値以上である必要がある場合のメッセージ
        less_than: は%{count}より小さい値にしてください # 指定値より小さい必要がある場合のメッセージ
        less_than_or_equal_to: は%{count}以下の値にしてください # 指定値以下である必要がある場合のメッセージ
        confirmation: と%{attribute}の入力が一致しません # 確認用の値が一致しない場合のメッセージ