# config/locales/views/ja.yml 
# ビュー（画面）関連の日本語化設定ファイル

ja: # 日本語設定の開始
  helpers: # フォームヘルパーの設定
    submit: # 送信ボタンのラベル設定
      create: 登録 # 新規作成時のボタンラベル
      submit: 保存 # 保存時のボタンラベル
      update: 更新 # 更新時のボタンラベル
    label: # フォームのラベル設定
      email: メールアドレス # email フィールドのラベル
      password: パスワード # password フィールドのラベル
  user_sessions: # ユーザーセッション（ログイン）関連の設定
    new: # ログイン画面の設定
      title: ログイン # ログイン画面のタイトル
      login: ログイン # ログインボタンのラベル
      to_register_page: 登録ページへ # 登録ページへのリンクテキスト
      password_forget: パスワードをお忘れの方はこちら # パスワード再設定ページへのリンクテキスト
  users: # ユーザー関連の設定
    new: # ユーザー登録画面の設定
      title: ユーザー登録 # ユーザー登録画面のタイトル
      to_login_page: ログインページへ # ログインページへのリンクテキスト
  header: # ヘッダー関連の設定
    login: ログイン # ログインリンクのテキスト
    logout: ログアウト # ログアウトリンクのテキスト
    board: 掲示板 # 掲示板リンクのテキスト
    board_index: 掲示板一覧 # 掲示板一覧リンクのテキスト
    create_board: 掲示板作成 # 掲示板作成リンクのテキスト
    bookmark_index: ブックマーク一覧 # ブックマーク一覧リンクのテキスト
    profile: プロフィール # プロフィールリンクのテキスト