# 【追加】config/locales/ja.yml
# 日本語の翻訳ファイル
# バリデーションエラーメッセージやカラム名を日本語化するための設定ファイル

# 日本語設定の開始
ja: 
  # 【追加】時刻の表示形式設定
  time:
    formats:
      default: "%Y/%m/%d %H:%M:%S" # デフォルトの時刻表示形式（例: 2024/01/15 14:30:00）
      short: "%m/%d %H:%M" # 短縮形式の時刻表示（例: 01/15 14:30）
  
  # 【追加】日付の表示形式設定
  date:
    formats:
      default: "%Y/%m/%d" # デフォルトの日付表示形式（例: 2024/01/15）
      short: "%m/%d" # 短縮形式の日付表示（例: 01/15）

  # 【追加】フォームヘルパーの翻訳設定   
  helpers:
    submit:
      create: 登録 # 新規作成ボタンのラベル
      submit: 保存 # 保存ボタンのラベル
      update: 更新 # 更新ボタンのラベル
    # 【追加】フォームのラベル翻訳（Devise のフォームラベルを日本語化）
    label:
      user: # 【追加】User モデルのフォームラベル
        email: メールアドレス # メールアドレスのラベル
        password: パスワード # パスワードのラベル
        password_confirmation: "パスワード（確認）" # 【追加】パスワード確認のラベル
        weight: "体重" # 【追加】体重のラベル
        remember_me: "ログイン状態を保持する" # 【追加】
  
  # Devise 用の翻訳設定（ビューとメッセージをまとめる）
  devise:
    # ログイン画面の翻訳
    sessions:
      new:
        title: ログイン # ログイン画面のタイトル
        sign_in: ログイン # ログインボタンのラベル
    # ユーザー登録画面の翻訳
    registrations:
      new:
        title: ユーザー登録 # ユーザー登録画面のタイトル
        sign_up: 登録 # 登録ボタンのラベル
      edit: #【追加】
        title: ユーザー編集 # ユーザー編集画面のタイトル
        update: 更新 # 更新ボタンのラベル
    # 共通リンクの翻訳
    shared:
      links:
        sign_in: ログイン # ログインページへのリンクテキスト
        sign_up: 登録 # 登録ページへのリンクテキスト
        forgot_password: パスワードをお忘れですか？ # パスワード再設定ページへのリンクテキスト
        didnt_receive_confirmation_instructions: 確認メールを受信できませんでしたか？ # 【修正】確認メール再送ページへのリンクテキスト
        didnt_receive_unlock_instructions: アカウントロック解除の手順を受信できませんでしたか？ # 【修正】アカウントロック解除ページへのリンクテキスト
    failure:
      invalid: "メールアドレスまたはパスワードが正しくありません" # ログイン失敗時のエラーメッセージ

  # ActiveRecord（モデル）の翻訳設定
  activerecord: 
    # 【追加】モデル名の翻訳
    models:
      user: "ユーザー" 

    # モデルのカラム名の翻訳
    attributes: 
      user: # User モデルのカラム名を日本語化
        email: "メールアドレス" # email カラムの日本語表示名（エラーメッセージ例: 「メールアドレスを入力してください」）
        password: "パスワード" # password カラムの日本語表示名（エラーメッセージ例: 「パスワードを入力してください」）
        password_confirmation: "パスワード（確認）" # 【追加】password_confirmation カラムの日本語表示名（エラーメッセージ例: 「パスワード（確認）を入力してください」）
        weight: "体重" # 【追加】weight カラムの日本語表示名（エラーメッセージ例: 「体重を入力してください」）
        first_name: "名" # first_name カラムの日本語表示名（エラーメッセージ例: 「名を入力してください」）
        last_name: "姓" # last_name カラムの日本語表示名（エラーメッセージ例: 「姓を入力してください」）

    # バリデーションエラーメッセージの翻訳
    errors:
      messages: # エラーメッセージの定義
        blank: "を入力してください" # 必須項目が空の場合（例: 「体重を入力してください」）
        too_short: "は%{count}文字以上で入力してください" # 文字数が最小値未満の場合（例: 「パスワードは3文字以上で入力してください」）
        too_long: "は%{count}文字以内で入力してください" # 文字数が最大値を超えた場合（例: 「名前は255文字以内で入力してください」）
        invalid: "は不正な値です" # 形式が不正な場合（例: 「メールアドレスは不正な値です」）
        taken: "はすでに存在します" # すでに存在する値の場合（例: 「メールアドレスはすでに存在します」）
        not_a_number: "は数値で入力してください" # 数値でない場合（例: 「体重は数値で入力してください」）
        greater_than: "は%{count}より大きい値にしてください" # 指定値より大きい必要がある場合（例: 「体重は0より大きい値にしてください」）
        greater_than_or_equal_to: "は%{count}以上の値にしてください" # 指定値以上である必要がある場合（例: 「年齢は18以上の値にしてください」）
        less_than: "は%{count}より小さい値にしてください" # 指定値より小さい必要がある場合（例: 「年齢は100より小さい値にしてください」）
        less_than_or_equal_to: "は%{count}以下の値にしてください" # 指定値以下である必要がある場合（例: 「年齢は120以下の値にしてください」）
        confirmation: "と%{attribute}の入力が一致しません" # 【追加】確認用の値が一致しない場合（例: 「パスワードとパスワード（確認）の入力が一致しません」）
    